<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FácilZap - Pedidos por Data</title>
<style>
  :root{
    --bg:#15171C; --card:#1c1f26; --jade:#19C39B; --coral:#FF6B5E; --text:#EDEFF2; --muted:#8B93A1;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:var(--bg); color:var(--text); padding:20px 14px 60px; min-height:100vh;
  }
  .wrap{max-width:600px;margin:0 auto;}
  h1{font-size:19px;margin:0 0 4px;}
  p.sub{color:var(--muted);font-size:13px;margin:0 0 16px;}
  .card{
    background:var(--card); border-radius:14px; padding:16px; margin-bottom:12px;
    border:1px solid rgba(255,255,255,0.06);
  }
  .datebar{display:flex;gap:8px;margin-bottom:16px;}
  input[type=date]{
    flex:1; padding:11px 12px; border-radius:9px; border:1px solid rgba(255,255,255,0.12);
    background:#1c1f26; color:var(--text); font-size:14px; font-family:inherit;
  }
  .quickbtns{display:flex;gap:8px;margin-bottom:14px;}
  .quickbtns button{
    flex:1;padding:9px;border-radius:8px;border:1px solid rgba(255,255,255,0.15);background:transparent;
    color:var(--muted);font-size:12.5px;margin-top:0;
  }
  .quickbtns button.active{border-color:var(--jade);color:var(--jade);}
  .stats{display:flex;gap:10px;margin-bottom:16px;}
  .stat{flex:1;background:var(--card);border-radius:12px;padding:14px;text-align:center;border:1px solid rgba(255,255,255,0.06);}
  .stat .num{font-size:22px;font-weight:700;color:var(--jade);}
  .stat .lbl{font-size:11px;color:var(--muted);margin-top:2px;}
  .pedido-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
  .pedido-codigo{font-weight:700;font-size:14px;}
  .pedido-valor{color:var(--jade);font-weight:700;font-size:14px;}
  .pedido-cliente{font-size:13px;color:var(--muted);}
  .pedido-data{font-size:11.5px;color:var(--muted);margin-top:4px;}
  .loading{color:var(--muted);font-size:13px;padding:20px 0;text-align:center;}
  .empty{color:var(--muted);font-size:13px;padding:20px;text-align:center;}
  .err{background:rgba(255,107,94,0.12);border:1px solid var(--coral);color:var(--coral);padding:12px;border-radius:9px;font-size:12.5px;white-space:pre-wrap;word-break:break-word;font-family:ui-monospace,Menlo,monospace;}
  button.buscar{
    padding:12px; border-radius:10px; border:none; background:var(--jade);
    color:#0f1115; font-weight:700; font-size:13px; cursor:pointer; width:100%; margin-top:0;
  }
  .badge{display:inline-block;padding:2px 8px;border-radius:6px;background:rgba(255,255,255,0.08);font-size:10.5px;color:var(--muted);}
</style>
</head>
<body>
<div class="wrap">
  <span class="badge">Grafite &amp; Jade</span>
  <h1>Pedidos por Data</h1>
  <p class="sub">Escolhe o dia (hoje, ontem, ou qualquer data) e consulta.</p>

  <div class="quickbtns">
    <button id="btnHoje">Hoje</button>
    <button id="btnOntem" class="active">Ontem</button>
  </div>

  <div class="datebar">
    <input type="date" id="dataInput">
    <button class="buscar" id="btnBuscar" style="width:auto;padding:11px 18px;">Buscar</button>
  </div>

  <div class="stats" id="stats" style="display:none">
    <div class="stat"><div class="num" id="statCount">0</div><div class="lbl">Pedidos</div></div>
    <div class="stat"><div class="num" id="statTotal">R$0</div><div class="lbl">Total</div></div>
  </div>

  <div id="conteudo" class="loading">Carregando...</div>
</div>

<script>
const API_BASE = '/api';

function dataISO(offsetDias) {
  const d = new Date();
  d.setDate(d.getDate() + offsetDias);
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${dd}`;
}

const dataInput = document.getElementById('dataInput');
dataInput.value = dataISO(-1);

document.getElementById('btnHoje').addEventListener('click', () => {
  dataInput.value = dataISO(0);
  setActive('btnHoje');
  carregar();
});
document.getElementById('btnOntem').addEventListener('click', () => {
  dataInput.value = dataISO(-1);
  setActive('btnOntem');
  carregar();
});
document.getElementById('btnBuscar').addEventListener('click', () => {
  setActive(null);
  carregar();
});

function setActive(id) {
  document.getElementById('btnHoje').classList.remove('active');
  document.getElementById('btnOntem').classList.remove('active');
  if (id) document.getElementById(id).classList.add('active');
}

async function carregar() {
  const dataAlvo = dataInput.value;
  document.getElementById('conteudo').innerHTML = '<div class="loading">Carregando pedidos...</div>';
  document.getElementById('stats').style.display = 'none';

  try {
    const url = `${API_BASE}/pedidos?filtros[data_inicial]=${dataAlvo}&filtros[data_final]=${dataAlvo}`;
    const res = await fetch(url);
    const data = await res.json();

    if (!res.ok) {
      document.getElementById('conteudo').innerHTML =
        `<div class="err">Erro ao carregar pedidos:\n${JSON.stringify(data, null, 2)}</div>`;
      return;
    }

    const pedidos = Array.isArray(data) ? data : (data.data || []);
    const pedidosFiltrados = pedidos.filter(p => {
      const dataPedido = p.data || p.criado_em || p.created_at || '';
      return dataPedido.startsWith(dataAlvo);
    });

    if (pedidosFiltrados.length === 0) {
      document.getElementById('conteudo').innerHTML =
        `<div class="empty">Nenhum pedido encontrado para ${dataAlvo.split('-').reverse().join('/')}.\n\n(Total retornado pela API: ${pedidos.length} pedidos)</div>`;
      return;
    }

    let total = 0;
    const html = pedidosFiltrados.map(p => {
      const valor = parseFloat(p.total || p.valor_total || 0);
      total += valor;
      const cliente = (p.cliente && p.cliente.nome) || p.cliente_nome || 'Cliente não identificado';
      const codigo = p.codigo || p.id || '—';
      const dataStr = p.data || p.criado_em || '';
      return `
        <div class="card">
          <div class="pedido-header">
            <span class="pedido-codigo">#${codigo}</span>
            <span class="pedido-valor">R$ ${valor.toFixed(2).replace('.', ',')}</span>
          </div>
          <div class="pedido-cliente">${cliente}</div>
          <div class="pedido-data">${dataStr}</div>
        </div>
      `;
    }).join('');

    document.getElementById('conteudo').innerHTML = html;
    document.getElementById('statCount').textContent = pedidosFiltrados.length;
    document.getElementById('statTotal').textContent = 'R$' + total.toFixed(2).replace('.', ',');
    document.getElementById('stats').style.display = 'flex';
  } catch (e) {
    document.getElementById('conteudo').innerHTML = `<div class="err">Falha na requisição:\n${e.message}</div>`;
  }
}

carregar();
</script>
</body>
</html>
